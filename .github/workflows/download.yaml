"on":
  workflow_run:
    workflows:
      - upload
    types:
      - completed
name: download
jobs:
  default:
    permissions:
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        id: download-artifact
        uses: actions/download-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: results
          run-id: ${{ github.event.workflow_run.id }}
      - name: Display artifact content
        run: |
          ls
          cat results/run_id.txt
          echo ${{ steps.download-artifact.outputs }}
