concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
"on":
  schedule:
    - cron: "*/10 * * * *"
name: download
jobs:
  default:
    runs-on:
      group: large
    steps:
      - name: Download artifact
        id: download-artifact
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: build.yaml
          workflow_conclusion: success
          event: schedule
